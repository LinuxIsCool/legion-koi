# Default extraction pipeline configuration.
# Swap configs for ablation: fast.yaml (regex only), gliner.yaml (future), etc.
#
# TELUS model resolution: LLMEntityExtractor reads TELUS_LLM_MODEL from
# env vars or ~/.claude/local/secrets/telus-api.env at runtime.
# Do NOT hardcode a model here — it must match the TELUS_OLLAMA_URL endpoint.

version: "1.0"
name: "default"
stages:
  ner:
    backend: llm
    params: {}
  regex:
    backend: regex
    params: {}
  resolve:
    backend: fuzzy
    params:
      similarity_threshold: 0.85
